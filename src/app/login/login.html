<div class="page">
  <div class="card">
    <div class="logo">Helpp Admin</div>
    <p class="subtitle">Acesso restrito à equipe interna.</p>

    @if (error()) {
      <div class="alert error">{{ error() }}</div>
    }

    <form (ngSubmit)="submit()" #f="ngForm">
      <div class="field">
        <label>E-mail</label>
        <input
          [(ngModel)]="email"
          name="email"
          type="email"
          placeholder="root@helpp"
          required
          autocomplete="username"
        />
      </div>

      <div class="field">
        <label>Senha</label>
        <input
          [(ngModel)]="password"
          name="password"
          type="password"
          placeholder="••••••••"
          required
          autocomplete="current-password"
        />
      </div>

      <button type="submit" [disabled]="loading() || f.invalid" class="btn-submit">
        {{ loading() ? 'Entrando...' : 'Entrar' }}
      </button>
    </form>
  </div>
</div>
